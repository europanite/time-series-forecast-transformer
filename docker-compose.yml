services:
  backend:
    build:
      context: ./backend
      args:
        PYTORCH_VERSION: ${PYTORCH_VERSION:-2.7.1}
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu126}
    image: local-ts-forecast-backend:latest
    env_file:
      - .env
    environment:
      HF_HOME: ${HF_HOME:-/cache/huggingface}
      FORECAST_BACKEND: ${FORECAST_BACKEND:-seasonal_naive}
      CHRONOS_MODEL_ID: ${CHRONOS_MODEL_ID:-autogluon/chronos-2-small}
      TIMESFM_MODEL_ID: ${TIMESFM_MODEL_ID:-google/timesfm-2.5-200m-pytorch}
      MODEL_ID: ${MODEL_ID:-autogluon/chronos-2-small}
      DEVICE: ${DEVICE:-cpu}
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
      - ./data:/workspace/data:ro
      - hf-cache:/cache/huggingface
    ports:
      - "8000:8000"
    command: ["uvicorn", "local_ts_forecast.api:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: local-ts-forecast-frontend:latest
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    working_dir: /app
    volumes:
      - ./frontend/app:/app
      - ./data:/app/public/data:ro
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  hf-cache:
