name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Compose test services
        run: |
          docker compose -f docker-compose.test.yml build backend_test frontend_test

      - name: Run backend tests
        run: |
          docker compose -f docker-compose.test.yml run --rm backend_test

      - name: Run frontend typecheck
        run: |
          docker compose -f docker-compose.test.yml run --rm frontend_test

      - name: Clean up Docker Compose resources
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down --volumes --remove-orphans
