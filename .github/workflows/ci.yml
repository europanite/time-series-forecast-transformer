name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-compose-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Run backend and frontend tests
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend_test
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: reports/backend/coverage.xml
          if-no-files-found: ignore
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
